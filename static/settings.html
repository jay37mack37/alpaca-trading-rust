<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Settings - Alpaca Trading</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>⚙️ Settings</h1>
            <div class="nav-links">
                <a href="/" class="btn-refresh">← Dashboard</a>
                <button id="logout-btn" class="btn-refresh" style="margin-left: 10px;">Logout</button>
            </div>
        </header>

        <!-- API Keys Section -->
        <section class="card">
            <h2>Alpaca API Configuration</h2>
            <p style="color: #888; margin-bottom: 20px;">
                Enter your Alpaca Markets API credentials.
                <a href="https://alpaca.markets/" target="_blank" style="color: #4a9eff;">Get API keys →</a>
            </p>

            <form id="api-form" class="order-form">
                <div class="form-group">
                    <label for="api-key">API Key ID</label>
                    <input type="text" id="api-key" name="api_key" placeholder="Your Alpaca API Key ID" style="width: 100%;">
                </div>

                <div class="form-group">
                    <label for="api-secret">API Secret Key</label>
                    <input type="password" id="api-secret" name="api_secret" placeholder="Your Alpaca API Secret Key" style="width: 100%;">
                </div>

                <div class="form-group">
                    <label for="environment">Environment</label>
                    <select id="environment" name="environment" style="width: 100%;">
                        <option value="paper">Paper Trading (Recommended)</option>
                        <option value="live">Live Trading ⚠️</option>
                    </select>
                </div>

                <div id="env-warning" style="display: none; background: rgba(255, 68, 68, 0.2); border: 1px solid #ff4444; color: #ff6b6b; padding: 15px; border-radius: 8px; margin-bottom: 15px;">
                    ⚠️ Live trading uses REAL money. Be careful!
                </div>

                <button type="submit" class="btn-primary">Save API Keys</button>
            </form>

            <div id="api-success" class="success-message" style="display: none;"></div>
            <div id="api-error" class="error-message" style="display: none;"></div>
        </section>

        <!-- Change Password Section -->
        <section class="card">
            <h2>Change Password</h2>
            <form id="password-form" class="order-form">
                <div class="form-group">
                    <label for="current-password">Current Password</label>
                    <input type="password" id="current-password" name="current_password" style="width: 100%;">
                </div>

                <div class="form-group">
                    <label for="new-password">New Password</label>
                    <input type="password" id="new-password" name="new_password" style="width: 100%;">
                </div>

                <div class="form-group">
                    <label for="confirm-password">Confirm New Password</label>
                    <input type="password" id="confirm-password" name="confirm_password" style="width: 100%;">
                </div>

                <button type="submit" class="btn-primary">Update Password</button>
            </form>

            <div id="password-success" class="success-message" style="display: none;"></div>
            <div id="password-error" class="error-message" style="display: none;"></div>
        </section>

        <footer>
            <p>Educational Trading Platform</p>
        </footer>
    </div>

<script src="/static/auth-helper.js"></script>
    <script>
        // Check auth
        const token = localStorage.getItem('token');
        if (!token) {
            window.location.href = '/login.html';
        }

        // Logout
        document.getElementById('logout-btn').addEventListener('click', () => {
            performLogout('', token);
        });

        // Environment warning
        document.getElementById('environment').addEventListener('change', (e) => {
            const warning = document.getElementById('env-warning');
            warning.style.display = e.target.value === 'live' ? 'block' : 'none';
        });

        // Load current API key status
        async function loadApiStatus() {
            try {
                const response = await fetch('/api/config/status', {
                    headers: { 'Authorization': `Bearer ${token}` }
                });

                if (response.status === 401) {
                    localStorage.removeItem('token');
                    localStorage.removeItem('username');
                    window.location.href = '/login.html';
                    return;
                }

                const data = await response.json();

                if (data.configured) {
                    document.getElementById('api-key').placeholder = '•••••••••••••••• (configured)';
                    document.getElementById('api-secret').placeholder = '•••••••••••••••• (configured)';
                    document.getElementById('environment').value = data.environment || 'paper';
                }
            } catch (err) {
                console.error('Failed to load config status:', err);
            }
        }

        loadApiStatus();

        // Save API keys
        document.getElementById('api-form').addEventListener('submit', async (e) => {
            e.preventDefault();

            const apiKey = document.getElementById('api-key').value;
            const apiSecret = document.getElementById('api-secret').value;
            const environment = document.getElementById('environment').value;

            if (!apiKey || !apiSecret) {
                document.getElementById('api-error').style.display = 'block';
                document.getElementById('api-error').textContent = 'Please enter both API Key and Secret';
                return;
            }

            document.getElementById('api-error').style.display = 'none';
            document.getElementById('api-success').style.display = 'none';

            try {
                const response = await fetch('/api/config/api-keys', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({ api_key: apiKey, api_secret: apiSecret, environment })
                });

                if (response.status === 401) {
                    localStorage.removeItem('token');
                    localStorage.removeItem('username');
                    window.location.href = '/login.html';
                    return;
                }

                const data = await response.json();

                if (response.ok) {
                    document.getElementById('api-success').style.display = 'block';
                    document.getElementById('api-success').textContent = 'API keys saved successfully!';
                    document.getElementById('api-key').value = '';
                    document.getElementById('api-secret').value = '';
                    loadApiStatus();
                } else {
                    document.getElementById('api-error').style.display = 'block';
                    document.getElementById('api-error').textContent = data.error || 'Failed to save';
                }
            } catch (err) {
                document.getElementById('api-error').style.display = 'block';
                document.getElementById('api-error').textContent = 'Connection error';
            }
        });

        // Change password
        document.getElementById('password-form').addEventListener('submit', async (e) => {
            e.preventDefault();

            const currentPassword = document.getElementById('current-password').value;
            const newPassword = document.getElementById('new-password').value;
            const confirmPassword = document.getElementById('confirm-password').value;

            if (newPassword !== confirmPassword) {
                document.getElementById('password-error').style.display = 'block';
                document.getElementById('password-error').textContent = 'Passwords do not match';
                return;
            }

            if (newPassword.length < 6) {
                document.getElementById('password-error').style.display = 'block';
                document.getElementById('password-error').textContent = 'Password must be at least 6 characters';
                return;
            }

            try {
                const response = await fetch('/api/config/password', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({ current_password: currentPassword, new_password: newPassword })
                });

                if (response.status === 401) {
                    localStorage.removeItem('token');
                    localStorage.removeItem('username');
                    window.location.href = '/login.html';
                    return;
                }

                const data = await response.json();

                if (response.ok) {
                    document.getElementById('password-success').style.display = 'block';
                    document.getElementById('password-success').textContent = 'Password changed successfully!';
                    document.getElementById('current-password').value = '';
                    document.getElementById('new-password').value = '';
                    document.getElementById('confirm-password').value = '';
                } else {
                    document.getElementById('password-error').style.display = 'block';
                    document.getElementById('password-error').textContent = data.error || 'Failed to change password';
                }
            } catch (err) {
                document.getElementById('password-error').style.display = 'block';
                document.getElementById('password-error').textContent = 'Connection error';
            }
        });
    </script>
</body>
</html>
