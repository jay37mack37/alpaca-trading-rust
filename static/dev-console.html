<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dev Console</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Monaco', 'Courier New', monospace;
            background-color: #1e1e1e;
            color: #d4d4d4;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .dev-header {
            background-color: #0066cc;
            color: white;
            padding: 12px 16px;
            border-bottom: 2px solid #004099;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-shrink: 0;
        }

        .dev-header h1 {
            font-size: 14px;
            font-weight: bold;
        }

        .dev-tabs {
            display: flex;
            gap: 12px;
            margin-top: 8px;
        }

        .dev-tab {
            padding: 6px 12px;
            background-color: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
            cursor: pointer;
            border-radius: 4px;
            font-size: 12px;
            transition: all 0.2s;
        }

        .dev-tab.active {
            background-color: rgba(255, 255, 255, 0.3);
            border-color: rgba(255, 255, 255, 0.5);
        }

        .dev-tab:hover {
            background-color: rgba(255, 255, 255, 0.2);
        }

        .dev-controls {
            display: flex;
            gap: 8px;
            align-items: center;
        }

        .dev-btn {
            padding: 4px 8px;
            background-color: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
            cursor: pointer;
            border-radius: 3px;
            font-size: 11px;
            transition: all 0.2s;
        }

        .dev-btn:hover {
            background-color: rgba(255, 255, 255, 0.2);
        }

        .dev-btn.danger {
            background-color: rgba(255, 100, 100, 0.2);
            border-color: rgba(255, 100, 100, 0.4);
        }

        .dev-btn.danger:hover {
            background-color: rgba(255, 100, 100, 0.3);
        }

        .dev-content {
            flex: 1;
            overflow-y: auto;
            padding: 12px;
            font-size: 12px;
            line-height: 1.6;
        }

        .log-entry {
            display: flex;
            gap: 8px;
            padding: 6px;
            margin-bottom: 4px;
            border-left: 3px solid;
            background-color: rgba(0, 0, 0, 0.3);
            border-radius: 2px;
        }

        .log-entry.log {
            border-color: #0066cc;
        }

        .log-entry.warn {
            border-color: #ff9900;
            background-color: rgba(255, 153, 0, 0.1);
        }

        .log-entry.error {
            border-color: #cc0000;
            background-color: rgba(204, 0, 0, 0.1);
        }

        .log-time {
            color: #858585;
            min-width: 80px;
            flex-shrink: 0;
        }

        .log-category {
            color: #0066cc;
            min-width: 60px;
            flex-shrink: 0;
            font-weight: bold;
        }

        .log-entry.warn .log-category {
            color: #ff9900;
        }

        .log-entry.error .log-category {
            color: #cc0000;
        }

        .log-message {
            color: #d4d4d4;
            flex: 1;
        }

        .log-data {
            color: #4ec9b0;
            font-size: 11px;
            margin-top: 4px;
            padding: 6px;
            background-color: rgba(0, 0, 0, 0.5);
            border-radius: 2px;
            max-height: 200px;
            overflow-y: auto;
            word-break: break-all;
            white-space: pre-wrap;
        }

        .network-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 11px;
        }

        .network-table thead {
            background-color: #333;
            position: sticky;
            top: 0;
        }

        .network-table th {
            padding: 8px;
            text-align: left;
            border-bottom: 1px solid #444;
            font-weight: bold;
        }

        .network-table td {
            padding: 6px 8px;
            border-bottom: 1px solid #2d2d2d;
        }

        .network-table tr:hover {
            background-color: rgba(0, 102, 204, 0.2);
        }

        .status-ok {
            color: #00cc00;
        }

        .status-error {
            color: #cc0000;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 12px;
            margin-bottom: 16px;
        }

        .stat-box {
            background-color: rgba(0, 102, 204, 0.1);
            border: 1px solid rgba(0, 102, 204, 0.3);
            padding: 12px;
            border-radius: 4px;
        }

        .stat-label {
            color: #858585;
            font-size: 11px;
            margin-bottom: 4px;
        }

        .stat-value {
            color: #0066cc;
            font-size: 16px;
            font-weight: bold;
        }

        .empty-state {
            color: #858585;
            text-align: center;
            padding: 24px;
            font-style: italic;
        }

        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }

        ::-webkit-scrollbar-track {
            background: #1e1e1e;
        }

        ::-webkit-scrollbar-thumb {
            background: #444;
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #555;
        }
    </style>
</head>

<body>
    <div class="dev-header">
        <div>
            <h1>🛠️ Developer Console</h1>
            <div class="dev-tabs">
                <button class="dev-tab active" onclick="switchTab('console')">Console</button>
                <button class="dev-tab" onclick="switchTab('network')">Network</button>
                <button class="dev-tab" onclick="switchTab('state')">State</button>
            </div>
        </div>
        <div class="dev-controls">
            <button class="dev-btn" onclick="clearLogs()">Clear Logs</button>
            <button class="dev-btn" onclick="exportLogs()">Export</button>
            <button class="dev-btn danger" onclick="clearAllData()">Clear Storage</button>
        </div>
    </div>

    <div class="dev-content">
        <div id="console-tab" class="tab-content">
            <div id="console-logs"></div>
        </div>

        <div id="network-tab" class="tab-content" style="display: none;">
            <div class="stats-grid" id="network-stats"></div>
            <table class="network-table">
                <thead>
                    <tr>
                        <th>Time</th>
                        <th>Method</th>
                        <th>URL</th>
                        <th>Status</th>
                        <th>Duration</th>
                        <th>Size</th>
                    </tr>
                </thead>
                <tbody id="network-table-body">
                    <tr>
                        <td colspan="6" class="empty-state">No network requests yet</td>
                    </tr>
                </tbody>
            </table>
        </div>

        <div id="state-tab" class="tab-content" style="display: none;">
            <div id="state-content"></div>
        </div>
    </div>

    <script>
        const NETWORK_LOG = [];

        function switchTab(tabName) {
            // Hide all tabs
            document.querySelectorAll('.tab-content').forEach(tab => tab.style.display = 'none');
            document.querySelectorAll('.dev-tab').forEach(btn => btn.classList.remove('active'));

            // Show selected tab
            document.getElementById(tabName + '-tab').style.display = 'block';
            event.target.classList.add('active');

            // Refresh tab content
            if (tabName === 'console') refreshConsoleLogs();
            if (tabName === 'network') refreshNetworkLogs();
            if (tabName === 'state') refreshStateTab();
        }

        function refreshConsoleLogs() {
            const logsDiv = document.getElementById('console-logs');
            if (window.opener && window.opener.LOG_BUFFER) {
                const logs = window.opener.LOG_BUFFER;
                logsDiv.innerHTML = logs.map(log => `
                    <div class="log-entry ${log.type}">
                        <span class="log-time">${log.time}</span>
                        <span class="log-category">${log.category}</span>
                        <span class="log-message">${log.message}</span>
                        ${log.data ? `<div class="log-data">${JSON.stringify(log.data, null, 2)}</div>` : ''}
                    </div>
                `).join('');
                logsDiv.scrollTop = logsDiv.scrollHeight;
            }
        }

        function refreshNetworkLogs() {
            if (!window.opener || !window.opener.NETWORK_LOG) return;

            const logs = window.opener.NETWORK_LOG;
            const tbody = document.getElementById('network-table-body');
            const stats = document.getElementById('network-stats');

            if (logs.length === 0) {
                tbody.innerHTML = '<tr><td colspan="6" class="empty-state">No network requests yet</td></tr>';
                return;
            }

            // Calculate stats
            const totalRequests = logs.length;
            const totalDuration = logs.reduce((sum, l) => sum + l.duration, 0);
            const totalSize = logs.reduce((sum, l) => sum + (l.size || 0), 0);
            const errors = logs.filter(l => l.status >= 400).length;

            stats.innerHTML = `
                <div class="stat-box">
                    <div class="stat-label">Total Requests</div>
                    <div class="stat-value">${totalRequests}</div>
                </div>
                <div class="stat-box">
                    <div class="stat-label">Total Time</div>
                    <div class="stat-value">${totalDuration.toFixed(0)}ms</div>
                </div>
                <div class="stat-box">
                    <div class="stat-label">Total Size</div>
                    <div class="stat-value">${(totalSize / 1024).toFixed(1)}KB</div>
                </div>
                <div class="stat-box">
                    <div class="stat-label">Errors</div>
                    <div class="stat-value" style="color: ${errors > 0 ? '#cc0000' : '#00cc00'}">${errors}</div>
                </div>
            `;

            tbody.innerHTML = logs.map(log => `
                <tr>
                    <td>${log.time}</td>
                    <td><strong>${log.method}</strong></td>
                    <td>${log.url}</td>
                    <td><span class="${log.status >= 400 ? 'status-error' : 'status-ok'}">${log.status}</span></td>
                    <td>${log.duration.toFixed(2)}ms</td>
                    <td>${log.size ? (log.size / 1024).toFixed(1)}KB : '-'}</td>
                </tr>
            `).join('');
        }

        function refreshStateTab() {
            const stateDiv = document.getElementById('state-content');
            if (window.opener) {
                const state = {
                    token: window.opener.localStorage.getItem('token') ? '✓ Set' : '✗ Missing',
                    username: window.opener.localStorage.getItem('username') || 'None',
                    apiBase: window.opener.API_BASE,
                    userAgent: window.opener.navigator.userAgent,
                    timestamp: new Date().toISOString()
                };
                stateDiv.innerHTML = `<div class="log-data">${JSON.stringify(state, null, 2)}</div>`;
            }
        }

        function clearLogs() {
            if (window.opener && window.opener.LOG_BUFFER) {
                window.opener.LOG_BUFFER.length = 0;
                refreshConsoleLogs();
            }
        }

        function exportLogs() {
            if (window.opener && window.opener.LOG_BUFFER) {
                const data = JSON.stringify(window.opener.LOG_BUFFER, null, 2);
                const blob = new Blob([data], { type: 'application/json' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `dev-logs-${new Date().toISOString().slice(0, 10)}.json`;
                a.click();
            }
        }

        function clearAllData() {
            if (confirm('Clear all localStorage data?')) {
                if (window.opener) {
                    window.opener.localStorage.clear();
                    window.opener.location.reload();
                }
            }
        }

        // Auto-refresh logs every 500ms
        setInterval(() => {
            const activeTab = document.querySelector('.dev-tab.active').textContent;
            if (activeTab.includes('Console')) refreshConsoleLogs();
            if (activeTab.includes('Network')) refreshNetworkLogs();
        }, 500);

        // Initial load
        refreshConsoleLogs();
    </script>
</body>

</html>
